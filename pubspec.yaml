name: knock_flutter
description: A client-side Flutter library to interact with user-facing Knock features, such as feeds.
version: 0.1.8
homepage: https://github.com/knocklabs/knock-flutter

environment:
  sdk: ">=3.1.5 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_timezone: ^5.0.2
  freezed_annotation: ^3.1.0
  http: ^1.6.0
  json_annotation: ^4.11.0
  phoenix_socket: ^0.8.0

dev_dependencies:
  build_runner: ^2.13.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  mockito: ^5.6.4
  pigeon: ^26.3.3
  very_good_analysis: ^10.2.0

flutter:
  plugin:
    platforms:
      android:
        package: app.knock
        pluginClass: KnockPlugin
      ios:
        pluginClass: KnockPlugin
